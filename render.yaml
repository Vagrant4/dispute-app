services:
  - type: web
    name: dispute-api
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build --workspace @claimproof/shared && npm run prisma:generate --workspace server && npm run build --workspace server
    startCommand: npm run db:deploy --workspace server && npm run start --workspace server
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dispute.db
      - key: UPLOAD_ROOT
        value: /var/data/uploads
      - key: CLIENT_ORIGIN
        value: https://dispute.app
      - key: SERVER_PUBLIC_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: STRIPE_BILLING_MODE
        value: disabled
      - key: REVENUECAT_WEBHOOK_SECRET
        sync: false
    disk:
      name: dispute-data
      mountPath: /var/data
      sizeGB: 1
